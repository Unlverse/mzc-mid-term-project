services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mzc-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: mzc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
